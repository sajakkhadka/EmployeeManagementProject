
spring.application.name=EmployeeManagement_Project



#Database Config
spring.datasource.url=jdbc:mysql://localhost:3306/empp?createDatabaseIfNotExist=true
spring.datasource.username=@@@@@@@
spring.datasource.password=@@@@@@@

#JPA config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true




spring.mail.host=smtp.gmail.com
