<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contact Us</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
body {
  background: linear-gradient(135deg, #0d6efd, #6f42c1);
  min-height: 100vh;
}

.contact-card {
  border-radius: 15px;
}

.contact-card h3 {
  font-weight: bold;
}

.form-control {
  border-radius: 10px;
}

.btn-send {
  border-radius: 30px;
  padding: 10px 30px;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center mt-5">
  <div class="col-md-6">

    <div class="card shadow contact-card">
      <div class="card-body p-4">

        <div class="text-center mb-4">
          <i class="fa-solid fa-envelope-open-text fa-3x text-primary"></i>
          <h3 class="mt-2">Contact Us</h3>
          <p class="text-muted">We’d love to hear from you</p>
        </div>

        <!-- FORM (BACKEND NOT TOUCHED) -->
        <form action="/contactUs" method="post">
		<p class="text-center"> Note: If you forget login credentials <br> please write email to "admin_support@gmail.com" </p>
          <div class="mb-3">
            <label class="form-label">
              <i class="fa-solid fa-at"></i> To (Email)
            </label>
            <input type="text" name="email" class="form-control"
                   placeholder="example@email.com" required>
          </div>

          <div class="mb-3">
            <label class="form-label">
              <i class="fa-solid fa-pen"></i> Subject
            </label>
            <input type="text" name="subject" class="form-control"
                   placeholder="Enter subject" required>
          </div>

          <div class="mb-3">
            <label class="form-label">
              <i class="fa-solid fa-message"></i> Message
            </label>
            <textarea rows="5" name="message" class="form-control"
                      placeholder="Type your message here..." required></textarea>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-primary btn-send">
              <i class="fa-solid fa-paper-plane"></i> Send Message
            </button>
          </div>

        </form>

      </div>
    </div>

  </div>
</div>

</body>
</html>
