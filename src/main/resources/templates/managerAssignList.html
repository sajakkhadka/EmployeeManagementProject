<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Manager Assign List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
.table-container {
  margin-top: 50px;
}

thead {
  background-color: #0d6efd;
  color: white;
}

.btn-action {
  border-radius: 20px;
}
</style>
</head>
<body>

<div class="container table-container">
  <h2 class="text-center text-primary mb-4"><i class="fa-solid fa-diagram-project"></i> Manager Assign List</h2>

  <table class="table table-striped table-hover shadow">
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Role</th>
        <th>DOB</th>
        <th>Mobile</th>
        <th>Email</th>
        <th>Manager</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="ev : ${data}">
        <td>[[${ev.fname}]] [[${ev.lname}]]</td>
        <td>[[${ev.role}]]</td>
        <td>[[${ev.dob}]]</td>
        <td>[[${ev.phone}]]</td>
        <td>[[${ev.email}]]</td>
        <td>
          <span th:if="${ev.manager.isEmpty()}">None</span>
          <span th:each="mm: ${ev.manager}">[[${mm.fname}]] [[${mm.lname}]]</span>
        </td>
        <td>
          <a th:href="@{/assignManager(id=${ev.id})}" class="btn btn-success btn-sm btn-action"><i class="fa-solid fa-user-gear"></i> Assign</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>

</body>
</html>
