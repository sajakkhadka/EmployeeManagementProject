<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Assign Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  background-color: #f8f9fa;
}

.form-card {
  border-radius: 15px;
  padding: 30px;
  margin-top: 50px;
}

.btn-submit {
  border-radius: 30px;
  padding: 10px 25px;
}
</style>
</head>
<body>

<div class="container">
  <div class="col-md-6 mx-auto">
    <div class="card shadow form-card">
      <h2 class="text-center text-primary mb-3"><i class="fa-solid fa-user-gear"></i> Assign Manager</h2>

      <form action="/assignEmployeeManager" method="post" th:object="${data}">
        <div class="mb-3">
          <label>Employee Name</label>
          <div class="d-flex gap-2">
            <input type="text" th:field="*{fname}" class="form-control" readonly>
            <input type="text" th:field="*{lname}" class="form-control" readonly>
          </div>
        </div>

        <div class="mb-3">
          <label>Email</label>
          <input type="text" th:field="*{email}" class="form-control" readonly>
        </div>

        <div class="mb-3">
          <label>Manager</label>
          <select th:field="*{manager}" class="form-control">
            <option value="">Select</option>
            <option th:each="dd : ${manData}" th:value="${dd.id}">[[${dd.fname}]] [[${dd.lname}]]</option>
          </select>
        </div>

        <input type="hidden" th:field="*{id}">

        <div class="text-center">
          <button type="submit" class="btn btn-primary btn-submit"><i class="fa-solid fa-user-check"></i> Assign</button>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
