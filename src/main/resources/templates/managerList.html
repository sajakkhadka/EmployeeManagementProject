<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Manager List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
.table-container {
  margin-top: 50px;
}

thead {
  background-color: #0d6efd;
  color: white;
}

.btn-action {
  border-radius: 20px;
}
</style>
</head>
<body>

<div class="container table-container">
  <h2 class="text-center text-primary mb-4"><i class="fa-solid fa-users-gear"></i> Manager List</h2>
  <p class="text-success text-center">[[${message1}]]</p>

  <table class="table table-striped table-hover shadow">
    <thead>
      <tr>
        <th>Full Name</th>
        <th>Role</th>
        <th>DOB</th>
        <th>Phone</th>
        <th>Email Id</th>
        <th>Address</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="ev : ${mlist}">
        <td>[[${ev.fname}]] [[${ev.lname}]]</td>
        <td>[[${ev.role}]]</td>
        <td>[[${ev.dob}]]</td>
        <td>[[${ev.phone}]]</td>
        <td>[[${ev.email}]]</td>
        <td>[[${ev.add.address}]], [[${ev.add.city}]], [[${ev.add.state}]], [[${ev.add.pincode}]]</td>
        <td>
          <a th:href="@{/manager_edit(id=${ev.id})}" class="btn btn-warning btn-sm btn-action"><i class="fa-solid fa-pen-to-square"></i> Edit</a>
          <a th:href="@{/manager_delete(id=${ev.id})}" class="btn btn-danger btn-sm btn-action"><i class="fa-solid fa-trash"></i> Delete</a>
        </td>
      </tr>
    </tbody>
  </table>
</div>

</body>
</html>
