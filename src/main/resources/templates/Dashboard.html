<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
.menu-card {
  cursor: pointer;
  transition: 0.3s;
  height: 150px;
}

.menu-card:hover {
  background-color: #0d6efd;
  color: white;
  transform: translateY(-5px);
}

.menu-card i {
  font-size: 40px;
  margin-bottom: 10px;
}
</style>
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="row g-4">

    <div class="col-md-4">
      <a href="/addEmployee" class="text-decoration-none text-dark">
        <div class="card menu-card text-center shadow p-4">
          <i class="fa-solid fa-user-plus"></i>
          <h5>Add Employee</h5>
        </div>
      </a>
    </div>

    <div class="col-md-4">
      <a href="/employeeList" class="text-decoration-none text-dark">
        <div class="card menu-card text-center shadow p-4">
          <i class="fa-solid fa-users"></i>
          <h5>Employee List</h5>
        </div>
      </a>
    </div>

    <div class="col-md-4">
      <a href="/managerList" class="text-decoration-none text-dark">
        <div class="card menu-card text-center shadow p-4">
          <i class="fa-solid fa-user-tie"></i>
          <h5>Manager List</h5>
        </div>
      </a>
    </div>

    <div class="col-md-4">
      <a href="/manager_assign" class="text-decoration-none text-dark">
        <div class="card menu-card text-center shadow p-4">
          <i class="fa-solid fa-diagram-project"></i>
          <h5>Manager Assign List</h5>
        </div>
      </a>
    </div>

    

    <div class="col-md-4">
      <a href="/contactUs" class="text-decoration-none text-dark">
        <div class="card menu-card text-center shadow p-4">
          <i class="fa-solid fa-envelope"></i>
          <h5>Contact Us</h5>
        </div>
      </a>
    </div>

  </div>
</div>

</body>
</html>
