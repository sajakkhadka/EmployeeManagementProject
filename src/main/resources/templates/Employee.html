<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Employee</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  background-color: #f8f9fa;
}

.form-card {
  border-radius: 15px;
  padding: 30px;
}

.form-card h2 {
  font-weight: bold;
  margin-bottom: 20px;
}

.btn-submit {
  border-radius: 30px;
  padding: 10px 25px;
}
</style>
</head>
<body>

<div class="container mt-5">
  <div class="col-md-8 mx-auto">
    <div class="card shadow form-card">
      <h2 class="text-center text-primary">Add Employee</h2>
      <h5 class="text-center text-success">[[${message}]]</h5>

      <form action="/employee" method="post">
        <div class="row mb-3">
          <div class="col">
            <label><i class="fa-solid fa-user"></i> First Name</label>
            <input type="text" name="fname" class="form-control" required>
          </div>
          <div class="col">
            <label><i class="fa-solid fa-user"></i> Last Name</label>
            <input type="text" name="lname" class="form-control" required>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col">
            <label><i class="fa-solid fa-calendar"></i> DOB</label>
            <input type="date" name="dob" class="form-control" required>
          </div>
          <div class="col">
            <label><i class="fa-solid fa-phone"></i> Mobile Number</label>
            <input type="text" name="phone" class="form-control" required>
          </div>
        </div>

        <div class="mb-3">
          <label><i class="fa-solid fa-envelope"></i> Email</label>
          <input type="email" name="email" class="form-control" required>
        </div>

        <div class="row mb-3">
          <div class="col">
            <label><i class="fa-solid fa-lock"></i> Password</label>
            <input type="password" name="password" class="form-control">
          </div>
          <div class="col">
            <label><i class="fa-solid fa-lock"></i> Confirm Password</label>
            <input type="password" name="cpassword" class="form-control">
          </div>
        </div>

        <div class="mb-3">
          <label><i class="fa-solid fa-house"></i> Address</label>
          <input type="text" name="add.address" class="form-control">
        </div>

        <div class="row mb-3">
          <div class="col">
            <label>City</label>
            <input type="text" name="add.city" class="form-control">
          </div>
          <div class="col">
            <label>State</label>
            <input type="text" name="add.state" class="form-control">
          </div>
          <div class="col">
            <label>Pincode</label>
            <input type="text" name="add.pincode" class="form-control">
          </div>
        </div>

        <div class="mb-3">
          <label><i class="fa-solid fa-user-tag"></i> Role</label>
          <select name="role" class="form-control">
            <option value="">---Choose---</option>
            <option value="Employee">Employee</option>
            <option value="Manager">Manager</option>
          </select>
        </div>

        <div class="text-center">
          <button type="submit" class="btn btn-primary btn-submit"><i class="fa-solid fa-user-plus"></i> Register</button>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
