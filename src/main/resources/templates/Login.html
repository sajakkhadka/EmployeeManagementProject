<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
body {
  background: linear-gradient(135deg, #0d6efd, #6f42c1);
  min-height: 100vh;
}

.login-card {
  border-radius: 15px;
  padding: 30px;
}

.form-control {
  border-radius: 10px;
}

.btn-login {
  border-radius: 30px;
  padding: 10px 30px;
}

a {
  text-decoration: none;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center mt-5">
  <div class="col-md-4">

    <div class="card shadow login-card">
      <div class="text-center mb-4">
        <i class="fa-solid fa-user-lock fa-3x text-primary"></i>
        <h3 class="mt-2">Login</h3>
        <p class="text-muted">Enter your application email and password</p>
      </div>

      <!-- Message from backend -->
      <p class="text-center text-danger fw-bold">[[${message}]]</p>

      <!-- LOGIN FORM (BACKEND NOT CHANGED) -->
      <form action="/login" method="post">

        <div class="mb-3">
          <label class="form-label">
            <i class="fa-solid fa-envelope"></i> Email
          </label>
          <input type="email" name="email" class="form-control"
                 placeholder="Enter your email" required>
        </div>

        <div class="mb-3">
          <label class="form-label">
            <i class="fa-solid fa-lock"></i> Password
          </label>
          <input type="password" name="password" class="form-control"
                 placeholder="Enter your password" required>
        </div>

        <div class="text-center mt-4">
          <button type="submit" class="btn btn-primary btn-login w-100">
            <i class="fa-solid fa-right-to-bracket"></i> Login
          </button>
        </div>

      </form>

      <div class="text-center mt-3">
        <a href="/contactUs" class="text-primary">
          <i class="fa-solid fa-circle-question"></i> Forgot Email or Password?
        </a>
      </div>

    </div>

  </div>
</div>

</body>
</html>
